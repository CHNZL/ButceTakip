name: Otomatik APK Olustur ve Yayinla

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: JDK Ayarla
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Ortam Değişkenlerini (Secrets) Hazırla
        run: |
          cat <<EOF > .env
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          WEB_CLIENT_ID=${{ secrets.WEB_CLIENT_ID }}
          FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          EOF

      - name: Keystore Dosyasını Üret
        run: |
          echo "${{ secrets.DEBUG_KEYSTORE_B64 }}" | base64 --decode > debug.keystore

      - name: Gradle'ı Ayarla
        uses: gradle/actions/setup-gradle@v3

      - name: Versiyon Bilgisini Guncelle
        run: |
          NEW_VERSION_CODE=${{ github.run_number }}
          NEW_VERSION_NAME="1.0.${{ github.run_number }}"
          sed -i "s/versionCode = [0-9]*/versionCode = $NEW_VERSION_CODE/g" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"$NEW_VERSION_NAME\"/g" app/build.gradle.kts

      - name: Debug APK Derle
        run: gradle assembleDebug

      - name: Version Bilgisini Çıkar ve version.json Olustur
        run: |
          VERSION_CODE=$(grep 'versionCode =' app/build.gradle.kts | head -1 | awk '{print $3}')
          VERSION_NAME=$(grep 'versionName =' app/build.gradle.kts | head -1 | awk '{print $3}' | tr -d '"')
          
          echo "Versiyon: $VERSION_NAME, Kod: $VERSION_CODE"
          
          cat <<EOF > version.json
          {
            "versionCode": $VERSION_CODE,
            "versionName": "$VERSION_NAME",
            "downloadUrl": "https://github.com/CHNZL/ButceTakip/releases/download/latest/app-debug.apk",
            "releaseNotes": "AI Studio üzerinden yeni kod gönderildi."
          }
          EOF

      - name: APK ve Version Dosyasını Kopyala
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk ./app-debug.apk

      - name: Latest Release Olarak Yayinla
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "latest"
          name: "Sürekli Güncel Sürüm"
          body: "Bu sürüm uygulamanın en son kodlarından otomatik olarak derlenmiştir."
          prerelease: false
          files: |
            app-debug.apk
            version.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
